<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>КИНОКАТАЛОГ | Фильмы и сериалы</title>
  <link rel="stylesheet" href="css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>

<div class="header">
  <div class="header-container">
    <div class="logo">
      <h1>КИНОКАТАЛОГ</h1>
      <p>▪ ФИЛЬМЫ ▪ СЕРИАЛЫ ▪ КОМЕДИИ ▪</p>
    </div>
    <div class="nav-links">
      <a data-section="movies" class="active">ГЛАВНАЯ</a>
      <a data-section="movies">ФИЛЬМЫ</a>
      <a data-section="tv">СЕРИАЛЫ</a>
      <a data-section="top">ТОП ЛУЧШИХ</a>
    </div>
  </div>
</div>

<div class="container">
  <div class="search-section">
    <div class="search-box">
      <input type="text" id="searchInput" placeholder="ПОИСК ПО НАЗВАНИЮ">
      <button id="searchBtn">ПОИСК</button>
    </div>
  </div>

  <div class="filters" id="filtersContainer">
    <button class="filter-btn active" data-filter="all">ВСЕ</button>
    <button class="filter-btn" data-filter="боевик">БОЕВИК</button>
    <button class="filter-btn" data-filter="комедия">КОМЕДИЯ</button>
    <button class="filter-btn" data-filter="драма">ДРАМА</button>
    <button class="filter-btn" data-filter="фантастика">ФАНТАСТИКА</button>
    <button class="filter-btn" data-filter="триллер">ТРИЛЛЕР</button>
    <button class="filter-btn" data-filter="криминал">КРИМИНАЛ</button>
    <button class="filter-btn" data-filter="фэнтези">ФЭНТЕЗИ</button>
  </div>

  <div class="section-title">
    <span></span>
    <span id="sectionTitle">ПОПУЛЯРНЫЕ ФИЛЬМЫ</span>
  </div>

  <div id="contentContainer" class="movies-grid"></div>
  <div id="pagination" class="pagination"></div>
</div>

<div class="footer">
  <p>© 2026 КИНОКАТАЛОГ — ВСЕ ПРАВА ЗАЩИЩЕНЫ</p>
</div>

<div id="movieModal" class="modal">
  <span class="close-modal">&times;</span>
  <div class="modal-content" id="modalContent"></div>
</div>

<script src="js/script.js"></script>
</body>
</html>
